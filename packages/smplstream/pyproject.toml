[project]
name = "smplstream"
version = "0.1.0"
description = "smplstream wire protocol: NDJSON frames over a content-addressed store, with canonical-PCM hashing and pipeline memoization."
requires-python = ">=3.10"
readme = "README.md"
dependencies = [
    "msgspec>=0.18",   # fast NDJSON encode/decode (dict-preserving for passthrough)
    "blake3>=0.4",     # CAS keys + memo keys
    "numpy>=1.24",     # canonical-PCM byte layout
    "soundfile>=0.12", # reference canonical decoder (libsndfile)
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/smplstream"]
