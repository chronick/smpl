[project]
name = "smpl-analysis"
version = "0.1.0"
description = "smpl analysis library: describe / loudness / spectral-shape / QC / spectrogram images over the smplstream protocol."
requires-python = ">=3.10"
dependencies = [
    "smplstream",
    "numpy>=1.24",
    "soundfile>=0.12",
    "scipy>=1.11",
    "librosa>=0.10",
    "pyloudnorm>=0.1.1",   # ITU-R BS.1770 integrated LUFS
    "matplotlib>=3.7",     # spectrogram / waveform PNG rendering
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/smpl_analysis"]
